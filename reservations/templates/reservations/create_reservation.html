{% extends 'base.html' %}
{% load static %}

{% block content %}
  <h2>Create reservation</h2>

  <label>Room:</label>
  <select id="room" required onchange="loadSlots()">
    <option value="">-- select --</option>
    {% for room in rooms %}
      <option value="{{ room.id }}">{{ room.name }}</option>
    {% endfor %}
  </select>

  <br /><br />

  <label>Date:</label>
  <input type="date" id="date" required onchange="loadSlots()" />

  <br /><br />

  <h3>Available slots</h3>
  <div id="slots">
    <p>Select room and date</p>
  </div>

  <hr />

  <form method="post">
    {% csrf_token %}

    <input type="hidden" name="room" id="room_hidden" />
    <input type="hidden" name="date" id="date_hidden" />

    <label>Start time:</label>
    <input type="time" name="start_time" required min="08:00" max="20:00" />

    <br /><br />

    <label>End time:</label>
    <input type="time" name="end_time" required min="08:00" max="20:00" />

    <br /><br />

    <button type="submit">Create Reservation</button>
  </form>

  {% if error %}
    <p style="color:red;">{{ error }}</p>
  {% endif %}

  <script>
    function loadSlots() {
      const room = document.getElementById('room').value
      const date = document.getElementById('date').value
    
      document.getElementById('room_hidden').value = room
      document.getElementById('date_hidden').value = date
    
      if (!room || !date) {
        document.getElementById('slots').innerHTML = '<p>Select room and date</p>'
        return
      }
    
      fetch(`/api/availability/?room_id=${room}&date=${date}`)
        .then((response) => response.json())
        .then((data) => {
          const container = document.getElementById('slots')
          container.innerHTML = ''
    
          if (data.error) {
            container.innerHTML = `<p style="color:red;">${data.error}</p>`
            return
          }
    
          if (data.slots.length === 0) {
            container.innerHTML = '<p>No available slots</p>'
            return
          }
    
          data.slots.forEach((slot) => {
            const div = document.createElement('div')
            div.textContent = `${slot.start} - ${slot.end}`
            container.appendChild(div)
          })
        })
    }
  </script>
{% endblock %}
