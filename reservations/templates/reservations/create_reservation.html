{% extends 'base.html' %}
{% load static %}

{% block content %}
  <h2>Create reservation</h2>

  <label>Room:</label>
  <select id="room" required onchange="loadSlots()">
    <option value="">-- select --</option>
    {% for room in rooms %}
      <option value="{{ room.id }}">{{ room.name }}</option>
    {% endfor %}
  </select>

  <br /><br />

  <label>Date:</label>
  <input type="date" id="date" required onchange="loadSlots()" />

  <br /><br />

  <h3>Available slots</h3>
  <div id="slots">
    <p>Select room and date</p>
  </div>

  <hr />

  <form id="reservationForm" onsubmit="submitReservation(event)">
    {% csrf_token %}

    <input type="hidden" name="room" id="room_hidden" />
    <input type="hidden" name="date" id="date_hidden" />

    <label>Start time:</label>
    <input type="time" name="start_time" required min="08:00" max="20:00" />

    <br /><br />

    <label>End time:</label>
    <input type="time" name="end_time" required min="08:00" max="20:00" />

    <br /><br />

    <button type="submit">Create Reservation</button>
  </form>

  <div id="reservationResult"></div>

  {% if error %}
    <p style="color:red;">{{ error }}</p>
  {% endif %}

  <script>
    function loadSlots() {
      const room = document.getElementById('room').value
      const date = document.getElementById('date').value
    
      document.getElementById('room_hidden').value = room
      document.getElementById('date_hidden').value = date
    
      if (!room || !date) {
        document.getElementById('slots').innerHTML = '<p>Select room and date</p>'
        return
      }
    
      fetch(`/api/availability/?room_id=${room}&date=${date}`)
        .then((response) => response.json())
        .then((data) => {
          const container = document.getElementById('slots')
          container.innerHTML = ''
    
          if (data.error) {
            container.innerHTML = `<p style="color:red;">${data.error}</p>`
            return
          }
    
          if (data.slots.length === 0) {
            container.innerHTML = '<p>No available slots</p>'
            return
          }
    
          data.slots.forEach((slot) => {
            const div = document.createElement('div')
            div.textContent = `${slot.start} - ${slot.end}`
            container.appendChild(div)
          })
        })
    }
    
    function submitReservation(event) {
      event.preventDefault()
    
      const payload = {
        room_id: document.getElementById('room_hidden').value,
        date: document.getElementById('date_hidden').value,
        start_time: document.querySelector('input[name="start_time"]').value,
        end_time: document.querySelector('input[name="end_time"]').value
      }
    
      fetch('/api/reservations/', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': '{{ csrf_token }}',
          'Idempotency-Key': crypto.randomUUID()
        },
        body: JSON.stringify(payload)
      })
        .then((res) => res.json())
        .then((data) => {
          const resultDiv = document.getElementById('reservationResult')
    
          if (data.error) {
            resultDiv.innerHTML = `<p style="color:red;">${data.error}</p>`
            return
          }
    
          resultDiv.innerHTML = `
              <br/>
              <h3>Reservation created</h3>
              <ul>
                <li><strong>ID:</strong> ${data.id}</li>
                <li><strong>Room:</strong> ${data.room_id}</li>
                <li><strong>Date:</strong> ${data.date}</li>
                <li><strong>Start:</strong> ${data.start_time}</li>
                <li><strong>End:</strong> ${data.end_time}</li>
                <li><strong>Status:</strong> ${data.status}</li>
              </ul>
              <a href="/my-reservations/">View all my reservations</a>
            `
        })
    }
  </script>
{% endblock %}
