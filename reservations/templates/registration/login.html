<head>
  <title>Co-Working Reservations</title>
  <style>
    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #f1f5f9;
    }
    body {
      background: linear-gradient(135deg, #1e293b, #334155);
      font-family: Arial, sans-serif;
    }
    
    .form {
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      max-width: max-content;
      margin: auto;
      padding: 30px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
      color: #f1f5f9;
    }
    
    .form input {
      margin: 10px 0;
      padding: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
      width: 200px;
    }
    
    .form button {
      margin-top: 10px;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: #6366f1;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      align-self: center;
    }
    
    .form button:hover {
      background: #4f46e5;
    }
    
    .form form button {
      display: block;
      margin: 10px auto;
    }
    
    #not_registered {
      color: #f1f5f9;
      text-align: center;
      margin-top: 20px;
      a {
        color: #f1f5f9;
      }
      a:hover {
        color: #6366f1;
      }
    }
  </style>
</head>

<body>
  <header>
    <h2>Welcome to Co-Working Reservations</h2>
    <h3>Login</h3>
  </header>
  <div class="form">
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Login</button>
    </form>
  </div>
  <p id="not_registered">
    Not registered? <a href=".">Register here</a>
  </p>
</body>
